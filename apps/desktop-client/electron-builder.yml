appId: com.antidetect.browser
productName: Antidetect Browser
copyright: Copyright © 2026 Phuc710

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

asarUnpack:
  - node_modules/fingerprint-injector/dist/utils.js

win:
  target:
    - target: nsis
      arch:
        - x64
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Network

publish:
  provider: github
  owner: Phuc710
  repo: Antidetect-Browser
